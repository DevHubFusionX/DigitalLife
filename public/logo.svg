<svg width="82" height="50" viewBox="0 0 82 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Royal Blue Gradient -->
    <linearGradient id="blueGrad" x1="10" y1="5" x2="35" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3e4095" />
      <stop offset="100%" stop-color="#2a2b66" />
    </linearGradient>
    <!-- Brand Yellow Gradient -->
    <linearGradient id="yellowGrad" x1="30" y1="5" x2="55" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd148" />
      <stop offset="100%" stop-color="#c99f18" />
    </linearGradient>
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Left Dynamic Arc (Blue representing Digital/Systems) -->
  <path 
    d="M 28 8 
       C 16 8, 10 16, 10 25 
       C 10 34, 16 42, 28 42 
       C 22 38, 18 32, 18 25 
       C 18 18, 22 12, 28 8 Z" 
    fill="url(#blueGrad)" 
  />

  <!-- Center Connecting Ribbon (representing Integration/Ehub) -->
  <path 
    d="M 28 8 
       C 34 8, 38 12, 40 18 
       C 36 22, 32 22, 28 25 
       C 32 28, 36 28, 40 32 
       C 38 38, 34 42, 28 42 
       C 33 38, 35 32, 33 25 
       C 35 18, 33 12, 28 8 Z" 
    fill="#3e4095" 
    opacity="0.85"
  />

  <!-- Right Dynamic Arc (Yellow representing Life/Growth) -->
  <path 
    d="M 33 8 
       C 45 8, 51 16, 51 25 
       C 51 34, 45 42, 33 42 
       C 39 38, 43 32, 43 25 
       C 43 18, 39 12, 33 8 Z" 
    fill="url(#yellowGrad)" 
  />

  <!-- Little Spark/Node at the top right representing Innovation -->
  <circle cx="51" cy="12" r="3.5" fill="#ffd148" filter="url(#glow)" />
</svg>
